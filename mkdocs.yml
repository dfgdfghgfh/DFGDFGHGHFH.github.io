site_name: 修仙 · 契灵 设定集
site_description: 一套修仙与契灵术共存的完整世界设定
site_author: 零

theme:
  name: material
  language: zh
  palette:
    primary: indigo
    accent: deep purple
  font:
    text: Noto Serif SC
    code: JetBrains Mono
  icon:
    logo: material/book-open-variant
    repo: fontawesome/brands/github
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.tabs.link
    - content.code.copy

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - def_list

plugins:
  - search:
      lang: zh

